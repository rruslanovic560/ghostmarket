<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>GhostMarket — Premium Game Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #070814;
      --card-dark: #0e1125;
      --accent-purple: #7c3aed;
      --accent-indigo: #6366f1;
      --text-light: #e4e4e7;
      --text-muted: #a1a1a6;
      --price-green: #10b981;
      --discount-red: #ef4444;
      --border-color: rgba(124, 58, 237, 0.08);
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg-dark); color: var(--text-light); -webkit-font-smoothing: antialiased; }
    body { overflow-x: hidden; }

    .app { display: flex; flex-direction: column; height: 100vh; }
    .scroll-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 16px; padding-bottom: 120px; -webkit-overflow-scrolling: touch; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .page-content { animation: fadeIn 0.3s ease-in-out; }

    /* ===== HEADER ===== */
    .header {
      background: var(--card-dark);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      backdrop-filter: blur(16px);
      z-index: 30;
    }

    .logo {
      font-weight: 800;
      font-size: 18px;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-indigo));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      flex: 1;
    }

    .header-actions { display: flex; align-items: center; gap: 10px; }

    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(124, 58, 237, 0.08);
      border: 1px solid var(--border-color);
      cursor: pointer;
      display: grid;
      place-items: center;
      color: var(--text-light);
      font-size: 18px;
      transition: all 0.24s;
      -webkit-user-select: none;
      user-select: none;
      position: relative;
    }

    .btn-icon:active { transform: scale(0.92); background: rgba(124, 58, 237, 0.16); }

    .btn-premium {
      padding: 6px 12px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.3), rgba(99, 102, 241, 0.2));
      border: 1px solid var(--accent-purple);
      color: var(--accent-purple);
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.24s;
      white-space: nowrap;
      -webkit-user-select: none;
      user-select: none;
      animation: pulse 2s infinite;
    }

    .btn-premium:active { transform: scale(0.96); }

    /* ===== BANNER ===== */
    .banner {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(99, 102, 241, 0.1));
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px 16px;
      margin-bottom: 16px;
      text-align: center;
    }

    .banner-title { font-weight: 800; font-size: 18px; margin-bottom: 8px; line-height: 1.3; }
    .banner-subtitle { color: var(--text-muted); font-size: 12px; margin-bottom: 14px; }

    .banner-buttons { display: flex; gap: 10px; margin-top: 14px; }

    .btn-banner {
      flex: 1;
      padding: 12px 14px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 13px;
      border: none;
      cursor: pointer;
      transition: all 0.24s;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-user-select: none;
      user-select: none;
    }

    .btn-banner-primary { background: linear-gradient(90deg, var(--accent-purple), var(--accent-indigo)); color: white; }
    .btn-banner-primary:active { transform: scale(0.96); opacity: 0.8; }

    .btn-banner-secondary { background: rgba(124, 58, 237, 0.08); border: 1px solid var(--border-color); color: var(--text-light); }
    .btn-banner-secondary:active { background: rgba(124, 58, 237, 0.16); }

    /* ===== CONSTRUCTOR SECTION ===== */
    .constructor-section {
      background: var(--card-dark);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .constructor-title { font-weight: 800; font-size: 14px; margin-bottom: 12px; }

    .game-selector {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 14px;
      padding-bottom: 8px;
      scrollbar-width: none;
    }

    .game-selector::-webkit-scrollbar { display: none; }

    .game-btn {
      flex: 0 0 auto;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(124, 58, 237, 0.08);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.24s;
      white-space: nowrap;
      -webkit-user-select: none;
      user-select: none;
    }

    .game-btn:active { transform: scale(0.95); }
    .game-btn.active { background: linear-gradient(90deg, var(--accent-purple), var(--accent-indigo)); color: white; border-color: var(--accent-purple); }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field-label { font-size: 12px; font-weight: 600; color: var(--text-muted); }

    .field-input {
      background: rgba(124, 58, 237, 0.04);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--text-light);
      font-size: 13px;
      font-family: Inter;
      outline: none;
      transition: all 0.24s;
    }

    .field-input:focus { border-color: var(--accent-purple); background: rgba(124, 58, 237, 0.08); }
    .field-input::placeholder { color: var(--text-muted); opacity: 0.5; }

    .field-input.error { border-color: var(--error); background: rgba(239, 68, 68, 0.1); }
    .field-error { font-size: 11px; color: var(--error); margin-top: 2px; display: none; }
    .field-error.show { display: block; }

    .pack-selector {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    .pack-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(124, 58, 237, 0.04);
      border: 2px solid var(--border-color);
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.24s;
      -webkit-user-select: none;
      user-select: none;
    }

    .pack-item:active { background: rgba(124, 58, 237, 0.12); }
    .pack-item.selected { background: rgba(124, 58, 237, 0.2); border-color: var(--accent-purple); }

    .pack-info { display: flex; flex-direction: column; gap: 4px; }
    .pack-name { font-weight: 700; font-size: 13px; }
    .pack-description { font-size: 11px; color: var(--text-muted); }
    .pack-price { font-weight: 800; color: var(--price-green); font-size: 14px; }

    .action-buttons { display: flex; gap: 8px; margin-top: 14px; }

    .btn-action {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 13px;
      border: none;
      cursor: pointer;
      transition: all 0.24s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      -webkit-user-select: none;
      user-select: none;
    }

    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-cart { background: rgba(124, 58, 237, 0.12); border: 1px solid var(--border-color); color: var(--text-light); }
    .btn-cart:active:not(:disabled) { background: rgba(124, 58, 237, 0.2); }

    .btn-buy-now { background: linear-gradient(90deg, var(--accent-purple), var(--accent-indigo)); color: white; }
    .btn-buy-now:active:not(:disabled) { transform: scale(0.96); }

    .cart-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--discount-red);
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 11px;
      animation: slideDown 0.3s ease;
    }

    /* ===== TAB BAR ===== */
    .tab-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--card-dark);
      border-top: 1px solid var(--border-color);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      backdrop-filter: blur(16px);
      z-index: 40;
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 8px 0;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.24s;
      font-size: 20px;
      -webkit-user-select: none;
      user-select: none;
    }

    .tab-item:active { transform: scale(0.88); }
    .tab-item.active { color: var(--accent-purple); }
    .tab-label { font-size: 9px; font-weight: 700; display: block; }

    /* ===== CART PAGE ===== */
    .cart-page { display: none; }
    .cart-page.active { display: block; animation: fadeIn 0.3s ease-in-out; }

    .cart-item {
      background: var(--card-dark);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-item-info { flex: 1; }
    .cart-item-name { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
    .cart-item-details { font-size: 11px; color: var(--text-muted); }
    .cart-item-price { font-weight: 800; font-size: 14px; color: var(--price-green); }
    .cart-remove { background: var(--error); color: white; border: none; border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 11px; transition: all 0.24s; }
    .cart-remove:active { transform: scale(0.9); }

    .cart-total {
      background: var(--card-dark);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      margin: 16px 0;
    }

    .cart-total-amount { font-weight: 800; font-size: 24px; color: var(--price-green); margin-bottom: 12px; }
    .cart-checkout-btn { width: 100%; background: linear-gradient(90deg, var(--accent-purple), var(--accent-indigo)); color: white; border: none; border-radius: 10px; padding: 14px; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.24s; }
    .cart-checkout-btn:active { transform: scale(0.96); }

    /* ===== MODAL ===== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-backdrop.visible { display: flex; }

    .modal-content {
      background: var(--card-dark);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      width: 88%;
      max-width: 400px;
      animation: slideDown 0.24s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-title { font-weight: 800; font-size: 16px; margin-bottom: 10px; }
    .modal-body { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
    .modal-actions { display: flex; gap: 10px; }
    .modal-btn { flex: 1; padding: 12px; border-radius: 10px; font-weight: 700; font-size: 13px; border: none; cursor: pointer; transition: all 0.24s; -webkit-user-select: none; user-select: none; }
    .modal-btn-cancel { background: rgba(124, 58, 237, 0.08); color: var(--text-light); }
    .modal-btn-confirm { background: linear-gradient(90deg, var(--accent-purple), var(--accent-indigo)); color: white; }
    .modal-btn:active { transform: scale(0.96); }

    /* ===== TOAST ===== */
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 14, 0.95);
      color: white;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 13px;
      z-index: 120;
      opacity: 0;
      animation: toastIn 0.24s forwards, toastOut 0.24s forwards 1.76s;
      border: 1px solid rgba(124, 58, 237, 0.2);
    }

    .toast.success { border-color: var(--success); }
    .toast.error { border-color: var(--error); }
    .toast.warning { border-color: var(--warning); }

    .hidden { display: none !important; }

    @media (max-width: 420px) {
      .logo { font-size: 15px; }
      .banner-title { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- HEADER -->
    <header class="header">
      <div class="logo">💜 GhostMarket</div>
      <button class="btn-premium" id="btnPremiumHeader">⭐ Premium</button>
      <div class="header-actions">
        <button class="btn-icon" id="btnNotifications">🔔</button>
        <button class="btn-icon" id="btnCartHeader" style="position: relative;">
          🛒
          <span class="cart-badge" id="cartBadgeEl" style="display: none;">0</span>
        </button>
      </div>
    </header>

    <!-- SCROLL CONTENT -->
    <div class="scroll-content" id="scrollContent">
      <!-- HOME PAGE -->
      <div id="homePage" class="page-content">
        <div class="banner">
          <div class="banner-title">🎮 Игровая валюта дешевле официальных цен</div>
          <div class="banner-subtitle">PUBG • Brawl Stars • Mobile Legends • Free Fire</div>
          <div class="banner-buttons">
            <button class="btn-banner btn-banner-primary" id="btnTopup">Пополнить баланс</button>
            <button class="btn-banner btn-banner-secondary" id="btnConstructorScroll">Конструктор</button>
          </div>
        </div>

        <!-- Constructor Section -->
        <div class="constructor-section">
          <div class="constructor-title">🎮 Выберите игру</div>

          <div class="game-selector" id="gameSelector"></div>
          <div id="fieldsContainer"></div>
          <div class="pack-selector" id="packSelector"></div>

          <div class="action-buttons">
            <button class="btn-action btn-cart" id="btnAddToCart">🛒 В корзину</button>
            <button class="btn-action btn-buy-now" id="btnBuyNow">⚡ Купить сейчас</button>
          </div>
        </div>
      </div>

      <!-- CART PAGE -->
      <div id="cartPage" class="cart-page">
        <div class="page-content">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h2 style="margin: 0; font-size: 18px;">🛒 Корзина</h2>
            <button class="btn-icon" id="btnBackFromCart" style="width: 36px; height: 36px;">←</button>
          </div>
          <div id="cartList"></div>
          <div class="cart-total">
            <div class="cart-total-amount" id="cartTotalAmount">0 ₽</div>
            <button class="cart-checkout-btn" id="btnCheckout">Оформить заказ</button>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB BAR -->
    <div class="tab-bar">
      <button class="tab-item active" data-page="home">
        <span>🛍️</span>
        <span class="tab-label">Магазин</span>
      </button>
      <button class="tab-item" data-page="cart">
        <span>📦</span>
        <span class="tab-label">Корзина</span>
      </button>
      <button class="tab-item" data-page="profile">
        <span>👤</span>
        <span class="tab-label">Профиль</span>
      </button>
      <button class="tab-item" data-page="settings">
        <span>⚙️</span>
        <span class="tab-label">Настройки</span>
      </button>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdropEl">
    <div class="modal-content">
      <div class="modal-title" id="modalTitleEl">Подтвердить</div>
      <div class="modal-body" id="modalBodyEl">Вы согласны?</div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="btnModalCancelEl">Отменить</button>
        <button class="modal-btn modal-btn-confirm" id="btnModalConfirmEl">Подтвердить</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toastContainerEl"></div>

  <script>
    // ==================== TELEGRAM SDK ====================
    const tg = window.Telegram?.WebApp || {};
    if (tg.ready) {
      try { tg.ready(); } catch (e) {}
    }

    const haptic = (type = 'medium') => {
      try { if (tg.HapticFeedback?.impactOccurred) tg.HapticFeedback.impactOccurred(type); } catch (e) {}
    };

    const hapticNotify = (type = 'success') => {
      try { if (tg.HapticFeedback?.notificationOccurred) tg.HapticFeedback.notificationOccurred(type); } catch (e) {}
    };

    // ==================== USER DATA ====================
    const userData = tg.initDataUnsafe?.user || { id: 0, first_name: 'Guest', username: 'guest' };
    const isAdminUser = userData.username === 'henotsosal';

    // ==================== STATE ====================
    const state = {
      currentPage: 'home',
      currentGame: 'pubg',
      selectedPack: null,
      cartItems: [],
      userBalance: 0,
      userPremium: 'free'
    };

    // ==================== GAME DATA ====================
    const gamesData = {
      pubg: {
        name: 'PUBG Mobile',
        emoji: '🎮',
        fields: [
          { id: 'uid', label: 'Игровой UID', placeholder: 'Введите UID...', required: true, validation: /^\d+$/ },
          { id: 'zone', label: 'Zone ID', placeholder: 'Введите Zone (0-5)...', required: true, validation: /^[0-5]$/ }
        ],
        packs: [
          { id: 'p60', name: '60 UC', price: 15, description: 'Базовый пакет' },
          { id: 'p300', name: '300 UC', price: 65, description: 'Популярный пакет' },
          { id: 'p600', name: '600 UC', price: 120, description: 'Выгодный пакет' }
        ]
      },
      brawl: {
        name: 'Brawl Stars',
        emoji: '⭐',
        fields: [
          { id: 'tag', label: 'Тег игрока', placeholder: '#XXXXXX', required: true, validation: /^#[0-9A-Z]{3,}$/ }
        ],
        packs: [
          { id: 'b80', name: '80 Gems', price: 18, description: 'Стартовый пакет' },
          { id: 'b170', name: '170 Gems', price: 35, description: 'Средний пакет' },
          { id: 'b360', name: '360 Gems', price: 69, description: 'Премиум пакет' }
        ]
      },
      mlbb: {
        name: 'Mobile Legends',
        emoji: '👾',
        fields: [
          { id: 'uid', label: 'User ID', placeholder: 'Введите User ID...', required: true, validation: /^\d+$/ },
          { id: 'server', label: 'Сервер', placeholder: 'Выберите сервер (1-5)...', required: true, validation: /^[1-5]$/ }
        ],
        packs: [
          { id: 'm50', name: '50 Diamonds', price: 12, description: 'Мини пакет' },
          { id: 'm100', name: '100 Diamonds', price: 24, description: 'Стандартный пакет' },
          { id: 'm220', name: '220 Diamonds', price: 55, description: 'Максимальный пакет' }
        ]
      },
      ff: {
        name: 'Free Fire',
        emoji: '🔥',
        fields: [
          { id: 'id', label: 'ID аккаунта', placeholder: 'Введите ID...', required: true, validation: /^\d+$/ }
        ],
        packs: [
          { id: 'f100', name: '100 Diamonds', price: 25, description: 'Базовый' },
          { id: 'f210', name: '210 Diamonds', price: 50, description: 'Стандартный' },
          { id: 'f440', name: '440 Diamonds', price: 99, description: 'Максимальный' }
        ]
      }
    };

    // ==================== DOM ELEMENTS ====================
    const scrollContent = document.getElementById('scrollContent');
    const homePage = document.getElementById('homePage');
    const cartPage = document.getElementById('cartPage');
    const tabItems = document.querySelectorAll('.tab-item');

    const gameSelectorContainer = document.getElementById('gameSelector');
    const fieldsContainer = document.getElementById('fieldsContainer');
    const packSelectorContainer = document.getElementById('packSelector');

    const cartBadgeEl = document.getElementById('cartBadgeEl');
    const modalBackdrop = document.getElementById('modalBackdropEl');
    const modalTitle = document.getElementById('modalTitleEl');
    const modalBody = document.getElementById('modalBodyEl');
    const btnModalConfirm = document.getElementById('btnModalConfirmEl');
    const btnModalCancel = document.getElementById('btnModalCancelEl');
    const toastContainer = document.getElementById('toastContainerEl');

    const cartList = document.getElementById('cartList');
    const cartTotalAmount = document.getElementById('cartTotalAmount');

    // ==================== HELPER FUNCTIONS ====================

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function showModal(title, body, onConfirm) {
      modalTitle.textContent = title;
      modalBody.textContent = body;
      btnModalConfirm.onclick = () => {
        if (onConfirm) onConfirm();
        closeModal();
      };
      modalBackdrop.classList.add('visible');
      haptic('light');
    }

    function closeModal() {
      modalBackdrop.classList.remove('visible');
      btnModalConfirm.onclick = null;
    }

    function updateCartBadge() {
      if (state.cartItems.length > 0) {
        cartBadgeEl.textContent = state.cartItems.length;
        cartBadgeEl.style.display = 'flex';
      } else {
        cartBadgeEl.style.display = 'none';
      }
    }

    function renderGameSelector() {
      gameSelectorContainer.innerHTML = '';
      Object.keys(gamesData).forEach(gameKey => {
        const gameInfo = gamesData[gameKey];
        const btn = document.createElement('button');
        btn.className = 'game-btn' + (gameKey === 'pubg' ? ' active' : '');
        btn.dataset.game = gameKey;
        btn.textContent = gameInfo.emoji + ' ' + gameInfo.name;
        btn.addEventListener('click', () => selectGame(gameKey));
        gameSelectorContainer.appendChild(btn);
      });
    }

    function selectGame(gameKey) {
      state.currentGame = gameKey;
      state.selectedPack = null;
      document.querySelectorAll('.game-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`[data-game="${gameKey}"]`).classList.add('active');
      renderFields();
      renderPacks();
      haptic('light');
    }

    function renderFields() {
      fieldsContainer.innerHTML = '';
      const gameInfo = gamesData[state.currentGame];
      gameInfo.fields.forEach(field => {
        const group = document.createElement('div');
        group.className = 'field-group';
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'field-input';
        input.dataset.field = field.id;
        input.placeholder = field.placeholder;
        input.dataset.validation = field.validation.toString();
        input.dataset.required = field.required;

        const label = document.createElement('label');
        label.className = 'field-label';
        label.textContent = field.label;

        const error = document.createElement('div');
        error.className = 'field-error';
        error.dataset.field = field.id;
        error.textContent = `Неверный формат ${field.label.toLowerCase()}`;

        input.addEventListener('blur', validateField);
        input.addEventListener('input', () => {
          input.classList.remove('error');
          error.classList.remove('show');
        });

        group.appendChild(label);
        group.appendChild(input);
        group.appendChild(error);
        fieldsContainer.appendChild(group);
      });
    }

    function validateField(e) {
      const field = e.target;
      const value = field.value.trim();
      const validationStr = field.dataset.validation;
      const isRequired = field.dataset.required === 'true';

      if (!value && isRequired) {
        field.classList.add('error');
        document.querySelector(`[data-field="${field.dataset.field}"]`).nextElementSibling?.classList.add('show');
        return false;
      }

      if (value) {
        try {
          const regex = new RegExp(validationStr.slice(1, -1));
          if (!regex.test(value)) {
            field.classList.add('error');
            document.querySelector(`.field-error[data-field="${field.dataset.field}"]`)?.classList.add('show');
            return false;
          }
        } catch (e) {}
      }

      field.classList.remove('error');
      document.querySelector(`.field-error[data-field="${field.dataset.field}"]`)?.classList.remove('show');
      return true;
    }

    function validateAllFields() {
      let isValid = true;
      document.querySelectorAll('.field-input').forEach(input => {
        if (!validateField({ target: input })) {
          isValid = false;
        }
      });
      return isValid;
    }

    function getFieldValues() {
      const values = {};
      document.querySelectorAll('.field-input').forEach(input => {
        values[input.dataset.field] = input.value.trim();
      });
      return values;
    }

    function renderPacks() {
      packSelectorContainer.innerHTML = '';
      const gameInfo = gamesData[state.currentGame];
      gameInfo.packs.forEach(pack => {
        const item = document.createElement('div');
        item.className = 'pack-item';
        item.dataset.pack = pack.id;
        item.innerHTML = `
          <div class="pack-info">
            <div class="pack-name">${pack.emoji ? pack.emoji + ' ' : ''}${pack.name}</div>
            <div class="pack-description">${pack.description}</div>
          </div>
          <div class="pack-price">${pack.price} ₽</div>
        `;
        item.addEventListener('click', () => selectPack(pack.id));
        packSelectorContainer.appendChild(item);
      });
    }

    function selectPack(packId) {
      document.querySelectorAll('.pack-item').forEach(item => item.classList.remove('selected'));
      document.querySelector(`[data-pack="${packId}"]`).classList.add('selected');
      state.selectedPack = packId;
      haptic('light');
    }

    function switchPage(pageName) {
      state.currentPage = pageName;
      haptic('light');

      homePage.classList.add('hidden');
      cartPage.classList.remove('active');

      if (pageName === 'home') {
        homePage.classList.remove('hidden');
      } else if (pageName === 'cart') {
        cartPage.classList.add('active');
        renderCartPage();
      }

      tabItems.forEach(item => {
        item.classList.toggle('active', item.dataset.page === pageName);
      });
      scrollContent.scrollTop = 0;
    }

    function renderCartPage() {
      if (state.cartItems.length === 0) {
        cartList.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 20px;">Корзина пуста 😢</p>';
        cartTotalAmount.textContent = '0 ₽';
        document.getElementById('btnCheckout').disabled = true;
        return;
      }

      document.getElementById('btnCheckout').disabled = false;

      let total = 0;
      cartList.innerHTML = '';

      state.cartItems.forEach((item, idx) => {
        const cartItem = document.createElement('div');
        cartItem.className = 'cart-item';
        cartItem.innerHTML = `
          <div class="cart-item-info">
            <div class="cart-item-name">${item.gameName} - ${item.packName}</div>
            <div class="cart-item-details">UID: ${item.uid || 'N/A'}</div>
          </div>
          <div style="display: flex; gap: 8px; align-items: center;">
            <div class="cart-item-price">${item.price} ₽</div>
            <button class="cart-remove" onclick="removeFromCart(${idx})">Удалить</button>
          </div>
        `;
        cartList.appendChild(cartItem);
        total += item.price;
      });

      cartTotalAmount.textContent = total + ' ₽';
    }

    function removeFromCart(idx) {
      state.cartItems.splice(idx, 1);
      updateCartBadge();
      renderCartPage();
      hapticNotify('success');
      showToast('Товар удален из корзины', 'warning');
    }

    window.removeFromCart = removeFromCart;

    // ==================== EVENT LISTENERS ====================

    document.getElementById('btnAddToCart').addEventListener('click', () => {
      haptic('light');

      if (!state.selectedPack) {
        showToast('⚠️ Выберите пакет', 'warning');
        return;
      }

      if (!validateAllFields()) {
        showToast('❌ Заполните все поля корректно', 'error');
        return;
      }

      const gameInfo = gamesData[state.currentGame];
      const packInfo = gameInfo.packs.find(p => p.id === state.selectedPack);
      const fieldValues = getFieldValues();

      state.cartItems.push({
        gameName: gameInfo.name,
        packName: packInfo.name,
        price: packInfo.price,
        ...fieldValues
      });

      updateCartBadge();
      hapticNotify('success');
      showToast('✅ Товар добавлен в корзину', 'success');

      // Clear fields
      document.querySelectorAll('.field-input').forEach(input => input.value = '');
      state.selectedPack = null;
      renderPacks();
    });

    document.getElementById('btnBuyNow').addEventListener('click', () => {
      haptic('light');

      if (!state.selectedPack) {
        showToast('⚠️ Выберите пакет', 'warning');
        return;
      }

      if (!validateAllFields()) {
        showToast('❌ Заполните все поля корректно', 'error');
        return;
      }

      const gameInfo = gamesData[state.currentGame];
      const packInfo = gameInfo.packs.find(p => p.id === state.selectedPack);
      const fieldValues = getFieldValues();

      const item = {
        gameName: gameInfo.name,
        packName: packInfo.name,
        price: packInfo.price,
        ...fieldValues
      };

      const payload = {
        action: 'checkout',
        items: [item],
        total: item.price
      };

      try {
        if (tg.sendData) {
          tg.sendData(JSON.stringify(payload));
        }
      } catch (e) {
        console.error('Send failed', e);
      }

      hapticNotify('success');
      showToast('✅ Заказ отправлен!', 'success');
    });

    document.getElementById('btnCheckout').addEventListener('click', () => {
      haptic('light');

      if (state.cartItems.length === 0) return;

      const total = state.cartItems.reduce((sum, item) => sum + item.price, 0);

      const payload = {
        action: 'checkout',
        items: state.cartItems.map(item => ({
          game: state.currentGame.toUpperCase(),
          title: `${item.gameName} - ${item.packName}`,
          price: item.price,
          uid: item.uid || '',
          zone: item.zone || ''
        })),
        total: total
      };

      try {
        if (tg.sendData) {
          tg.sendData(JSON.stringify(payload));
        }
      } catch (e) {
        console.error('Send failed', e);
      }

      state.cartItems = [];
      updateCartBadge();
      renderCartPage();
      hapticNotify('success');
      showToast('✅ Заказ успешно оформлен!', 'success');
      switchPage('home');
    });

    document.getElementById('btnCartHeader').addEventListener('click', () => {
      haptic('light');
      switchPage('cart');
    });

    document.getElementById('btnBackFromCart').addEventListener('click', () => {
      haptic('light');
      switchPage('home');
    });

    tabItems.forEach(item => {
      item.addEventListener('click', () => {
        const page = item.dataset.page;
        if (page === 'home' || page === 'cart') {
          switchPage(page);
        } else if (page === 'profile') {
          showToast('👤 Профиль', 'info');
        } else if (page === 'settings') {
          showToast('⚙️ Настройки', 'info');
        }
      });
    });

    btnModalCancel.addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', (e) => {
      if (e.target === modalBackdrop) closeModal();
    });

    document.getElementById('btnNotifications').addEventListener('click', () => {
      haptic('light');
      showToast('🔔 Нет новых уведомлений', 'info');
    });

    document.getElementById('btnPremiumHeader').addEventListener('click', () => {
      haptic('light');
      showToast('⭐ Скоро!', 'info');
    });

    document.getElementById('btnConstructorScroll').addEventListener('click', () => {
      haptic('light');
      switchPage('home');
    });

    document.getElementById('btnTopup').addEventListener('click', () => {
      haptic('light');
      showToast('💳 Пополнение в разработке', 'info');
    });

    // Initialize
    renderGameSelector();
    renderFields();
    renderPacks();
  </script>
</body>
</html>
