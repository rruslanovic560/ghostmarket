<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>GhostMarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { margin: 0; min-height: 100vh; background: #050816; color: #e2e8f0; }
        .app { padding-bottom: 110px; }
        .panel { background: #0f172a; border: 1px solid rgba(148,163,184,.12); }
        .tab-btn { transition: .2s; }
        .tab-btn.active { background: #1e293b; color: #60a5fa; }
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            border-radius: 999px;
            background: #e11d48;
            color: white;
            font-size: 11px;
            padding: 0 6px;
        }
        .note-card { border: 1px solid rgba(148,163,184,.18); }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); }
        .btn-primary:hover { opacity: .95; }
        .btn-secondary { background: #111827; }
        .btn-secondary:hover { background: #1f2937; }
    </style>
</head>
<body>
<div class="app">
    <div class="px-5 pt-5">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-xs uppercase tracking-[.24em] text-slate-500">GhostMarket</p>
                <h1 class="text-3xl font-bold text-white mt-2">Магазин внутри Telegram</h1>
                <p class="mt-2 text-slate-400">Покупай, пополняй, читай уведомления и получай помощь.</p>
            </div>
            <button id="exitApp" class="btn-secondary rounded-2xl px-4 py-3 text-sm font-semibold text-white">
                Выйти
            </button>
        </div>
    </div>

    <div class="mt-6 px-5">
        <div class="grid grid-cols-3 gap-3">
            <button class="tab-btn btn-secondary rounded-3xl py-3 font-semibold" data-tab="shop">Магазин</button>
            <button class="tab-btn btn-secondary rounded-3xl py-3 font-semibold" data-tab="chat">
                Чат <span id="chatBadge" class="badge ml-2 hidden">1</span>
            </button>
            <button class="tab-btn btn-secondary rounded-3xl py-3 font-semibold" data-tab="notifications">Уведомления</button>
        </div>
    </div>

    <div class="mt-5 px-5">
        <div id="shopPage" class="panel rounded-[32px] p-5 shadow-xl">
            <div class="flex flex-col gap-4">
                <div class="rounded-[28px] bg-[#111827] p-5">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-slate-400">Баланс</p>
                            <p id="balanceValue" class="text-3xl font-semibold text-white mt-2">0 ₽</p>
                        </div>
                        <div class="rounded-3xl bg-slate-800 px-4 py-2 text-sm text-slate-300">Premium</div>
                    </div>
                    <div class="mt-4 grid grid-cols-3 gap-3">
                        <button class="topup-btn rounded-3xl border border-slate-700 bg-[#111827] py-3 text-sm text-white" data-amount="50">+50 ₽</button>
                        <button class="topup-btn rounded-3xl border border-slate-700 bg-[#111827] py-3 text-sm text-white" data-amount="100">+100 ₽</button>
                        <button class="topup-btn rounded-3xl border border-slate-700 bg-[#111827] py-3 text-sm text-white" data-amount="200">+200 ₽</button>
                    </div>
                </div>

                <div class="rounded-[28px] bg-[#111827] p-5">
                    <h2 class="text-xl font-semibold text-white mb-4">MLBB / Telegram Stars</h2>
                    <div class="grid gap-4">
                        <input id="inputUid" type="text" placeholder="User ID"
                               class="w-full rounded-3xl border border-slate-700 bg-[#0f172a] p-4 text-white outline-none"/>
                        <input id="inputZone" type="text" placeholder="Zone ID"
                               class="w-full rounded-3xl border border-slate-700 bg-[#0f172a] p-4 text-white outline-none"/>
                        <div class="grid grid-cols-2 gap-3">
                            <button class="product-btn rounded-3xl border border-slate-700 bg-[#0f172a] p-4 text-left" data-product="35 Алм." data-price="59">
                                <p class="text-sm text-slate-400">35 Алмазов</p>
                                <p class="text-lg font-semibold text-white mt-2">59 ₽</p>
                            </button>
                            <button class="product-btn rounded-3xl border border-slate-700 bg-[#0f172a] p-4 text-left" data-product="85 Алм." data-price="149">
                                <p class="text-sm text-slate-400">85 Алмазов</p>
                                <p class="text-lg font-semibold text-white mt-2">149 ₽</p>
                            </button>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <button class="product-btn rounded-3xl border border-slate-700 bg-[#0f172a] p-4 text-left" data-product="50 Stars" data-price="150">
                                <p class="text-sm text-slate-400">50 Stars</p>
                                <p class="text-lg font-semibold text-white mt-2">150 ₽</p>
                            </button>
                            <button class="product-btn rounded-3xl border border-slate-700 bg-[#0f172a] p-4 text-left" data-product="100 Stars" data-price="290">
                                <p class="text-sm text-slate-400">100 Stars</p>
                                <p class="text-lg font-semibold text-white mt-2">290 ₽</p>
                            </button>
                        </div>
                    </div>
                    <button id="buyButton" class="mt-5 btn-primary w-full rounded-3xl py-4 text-base font-semibold text-white">
                        Купить
                    </button>
                </div>

                <div id="shopNotice" class="hidden rounded-[28px] border border-[#334155] bg-[#08101e] p-4 text-sm text-slate-300"></div>
            </div>
        </div>

        <div id="chatPage" class="panel rounded-[32px] p-5 shadow-xl hidden">
            <div class="space-y-4">
                <div class="rounded-[28px] bg-[#111827] p-5">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-slate-400">Виртуальный помощник</p>
                            <h2 class="text-xl font-semibold text-white mt-2">AI / Чат</h2>
                        </div>
                        <span class="rounded-full bg-emerald-500 px-3 py-1 text-xs font-semibold text-black">online</span>
                    </div>
                </div>

                <div id="chatHistory" class="space-y-3">
                    <div class="rounded-[28px] bg-[#0f172a] p-4">
                        <p class="text-sm text-slate-400">GhostBot</p>
                        <p class="mt-2 text-white">Привет! Здесь расскажу, как пополнить баланс и что делать дальше.</p>
                    </div>
                </div>

                <div class="grid gap-3">
                    <button class="chat-action btn-secondary rounded-3xl py-4 text-left text-white" data-action="howToTopUp">
                        <p class="font-semibold">Как пополнить баланс?</p>
                        <p class="text-sm text-slate-400 mt-1">Пошаговая инструкция</p>
                    </button>
                    <button class="chat-action btn-secondary rounded-3xl py-4 text-left text-white" data-action="needMoreMoney">
                        <p class="font-semibold">Недостаточно средств</p>
                        <p class="text-sm text-slate-400 mt-1">Что делать, если мало денег</p>
                    </button>
                    <button class="chat-action btn-secondary rounded-3xl py-4 text-left text-white" data-action="whatIsUid">
                        <p class="font-semibold">Что такое User ID?</p>
                        <p class="text-sm text-slate-400 mt-1">Объяснение нужных данных</p>
                    </button>
                </div>
            </div>
        </div>

        <div id="notificationsPage" class="panel rounded-[32px] p-5 shadow-xl hidden">
            <div class="space-y-4">
                <div class="rounded-[28px] bg-[#111827] p-5">
                    <p class="text-sm text-slate-400">Уведомления</p>
                    <h2 class="text-xl font-semibold text-white mt-2">Последние события</h2>
                </div>

                <div id="notificationsList" class="space-y-3"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    const balanceElement = document.getElementById('balanceValue');
    const chatBadge = document.getElementById('chatBadge');
    const shopNotice = document.getElementById('shopNotice');
    const notificationsList = document.getElementById('notificationsList');
    const chatHistory = document.getElementById('chatHistory');

    const state = {
        balance: parseFloat(localStorage.getItem('gm_balance') || '0'),
        selectedProduct: null,
        selectedPrice: 0,
        chatUnread: parseInt(localStorage.getItem('gm_chat_unread') || '1', 10),
        notifications: JSON.parse(localStorage.getItem('gm_notifications') || '[]')
    };

    function saveState() {
        localStorage.setItem('gm_balance', state.balance.toString());
        localStorage.setItem('gm_chat_unread', state.chatUnread.toString());
        localStorage.setItem('gm_notifications', JSON.stringify(state.notifications));
    }

    function renderBalance() {
        balanceElement.textContent = `${state.balance.toFixed(0)} ₽`;
    }

    function renderChatBadge() {
        if (state.chatUnread > 0) {
            chatBadge.classList.remove('hidden');
            chatBadge.textContent = state.chatUnread;
        } else {
            chatBadge.classList.add('hidden');
        }
    }

    function renderNotifications() {
        if (!state.notifications.length) {
            notificationsList.innerHTML = '<div class="rounded-[28px] bg-[#0f172a] p-4 text-slate-400">Уведомлений нет</div>';
            return;
        }

        notificationsList.innerHTML = state.notifications.map(note => `
            <div class="note-card rounded-[28px] bg-[#0f172a] p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm ${note.type === 'warning' ? 'text-amber-300' : 'text-slate-400'}">${note.title}</p>
                        <p class="mt-2 text-white">${note.text}</p>
                    </div>
                    <span class="text-xs ${note.read ? 'text-slate-500' : 'text-sky-400'}">${note.read ? 'прочитано' : 'новое'}</span>
                </div>
            </div>
        `).join('');
    }

    function addNotification(title, text, type = 'info') {
        state.notifications.unshift({ title, text, type, read: false, id: Date.now() });
        renderNotifications();
        saveState();
    }

    function markAllNotificationsRead() {
        state.notifications = state.notifications.map(n => ({ ...n, read: true }));
        renderNotifications();
        saveState();
    }

    function selectTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.tab === tab);
        });
        document.getElementById('shopPage').classList.toggle('hidden', tab !== 'shop');
        document.getElementById('chatPage').classList.toggle('hidden', tab !== 'chat');
        document.getElementById('notificationsPage').classList.toggle('hidden', tab !== 'notifications');

        if (tab === 'chat') {
            state.chatUnread = 0;
            saveState();
            renderChatBadge();
        }
        if (tab === 'notifications') {
            markAllNotificationsRead();
        }
    }

    function showShopNotice(text, type = 'info') {
        shopNotice.textContent = text;
        shopNotice.classList.remove('hidden');
        shopNotice.classList.toggle('text-emerald-400', type === 'success');
        shopNotice.classList.toggle('text-rose-400', type === 'error');
        setTimeout(() => shopNotice.classList.add('hidden'), 4500);
    }

    renderBalance();
    renderChatBadge();
    renderNotifications();

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => selectTab(btn.dataset.tab));
    });

    document.querySelectorAll('.topup-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const amount = Number(btn.dataset.amount);
            state.balance += amount;
            addNotification('Пополнение успешно', `Баланс увеличен на ${amount} ₽`, 'info');
            renderBalance();
            saveState();
            showShopNotice(`Баланс пополнен на ${amount} ₽`, 'success');
        });
    });

    document.querySelectorAll('.product-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.product-btn').forEach(el => {
                el.style.borderColor = '#334155';
                el.classList.remove('bg-[#1e293b]');
            });
            btn.style.borderColor = '#6366f1';
            btn.classList.add('bg-[#1e293b]');
            state.selectedProduct = btn.dataset.product;
            state.selectedPrice = Number(btn.dataset.price);
        });
    });

    document.getElementById('buyButton').addEventListener('click', () => {
        const uid = document.getElementById('inputUid').value.trim();
        const zone = document.getElementById('inputZone').value.trim();

        if (!uid || !zone || !state.selectedProduct) {
            showShopNotice('Заполните User ID, Zone ID и выберите товар.', 'error');
            return;
        }

        if (state.balance < state.selectedPrice) {
            addNotification('Недостаточно средств', `Для покупки ${state.selectedProduct} нужно ${state.selectedPrice} ₽`, 'warning');
            showShopNotice('Недостаточно средств. Пополните баланс.', 'error');
            return;
        }

        state.balance -= state.selectedPrice;
        addNotification('Покупка оформлена', `${state.selectedProduct} за ${state.selectedPrice} ₽ куплен`, 'info');
        renderBalance();
        saveState();
        showShopNotice(`Заказ оформлен: ${state.selectedProduct}`, 'success');
    });

    document.querySelectorAll('.chat-action').forEach(btn => {
        btn.addEventListener('click', () => {
            const action = btn.dataset.action;
            let message = '';

            if (action === 'howToTopUp') {
                message = 'Чтобы пополнить: нажми кнопку +50 или +100, после этого сумма добавится автоматически.';
            } else if (action === 'needMoreMoney') {
                message = 'Если не хватает средств, пополни баланс через кнопки на экране. После пополнения повтори покупку.';
            } else if (action === 'whatIsUid') {
                message = 'User ID — это уникальный номер в игре. Он нужен для быстрой доставки товара.';
            }

            const bubble = document.createElement('div');
            bubble.className = 'rounded-[28px] bg-[#0f172a] p-4';
            bubble.innerHTML = `<p class="text-sm text-slate-400">GhostBot</p><p class="mt-2 text-white">${message}</p>`;
            chatHistory.appendChild(bubble);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            state.chatUnread = 0;
            saveState();
            renderChatBadge();
        });
    });

    document.getElementById('exitApp').addEventListener('click', () => {
        tg.close();
    });
</script>
</body>
</html>
