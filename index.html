<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>GhostMarket Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0a0e27; color: #f3f4f6; }
        .card { background: linear-gradient(135deg, #1a1f3a 0%, #0f1419 100%); border: 1px solid #2d3748; }
        .btn-buy { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: transform 0.2s ease; }
        .btn-buy:active { transform: scale(0.98); }
    </style>
</head>
<body class="pb-24">

<div class="p-4 sticky top-0 bg-[#0a0e27]/95 backdrop-blur z-50 border-b border-[#2d3748]">
    <h1 class="text-2xl font-black">🔥 GHOSTMARKET</h1>
    <p class="text-xs text-gray-400">Premium Game Shop</p>
</div>

<div class="px-4 py-6 space-y-6">
    <div class="card p-6 rounded-2xl">
        <h2 class="font-black text-lg mb-4">💠 MOBILE LEGENDS АЛМАЗЫ</h2>
        <div class="space-y-3 mb-4">
            <input type="number" id="mlbb-uid" placeholder="User ID"
                   class="w-full bg-[#0f1419] border border-[#2d3748] rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500"/>
            <input type="number" id="mlbb-zone" placeholder="Zone ID"
                   class="w-full bg-[#0f1419] border border-[#2d3748] rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500"/>
        </div>
        <div class="grid grid-cols-2 gap-2 mb-4">
            <button class="product-btn card p-4 rounded-lg text-center hover:border-blue-500 transition"
                    data-product="35 Алмазов" data-price="59">
                <p class="font-bold">35 💠</p>
                <p class="text-emerald-400 text-sm">59 ₽</p>
            </button>
            <button class="product-btn card p-4 rounded-lg text-center hover:border-blue-500 transition"
                    data-product="85 Алмазов" data-price="149">
                <p class="font-bold">85 💠</p>
                <p class="text-emerald-400 text-sm">149 ₽</p>
            </button>
        </div>
        <button class="w-full btn-buy text-white font-bold py-3 rounded-lg" id="buy-mlbb">
            КУПИТЬ MLBB
        </button>
    </div>

    <div class="card p-6 rounded-2xl">
        <h2 class="font-black text-lg mb-4">⭐ TELEGRAM STARS</h2>
        <div class="grid grid-cols-2 gap-2 mb-4">
            <button class="product-btn card p-4 rounded-lg text-center hover:border-blue-500 transition"
                    data-product="50 Stars" data-price="150">
                <p class="font-bold">50 ⭐</p>
                <p class="text-emerald-400 text-sm">150 ₽</p>
            </button>
            <button class="product-btn card p-4 rounded-lg text-center hover:border-blue-500 transition"
                    data-product="100 Stars" data-price="290">
                <p class="font-bold">100 ⭐</p>
                <p class="text-emerald-400 text-sm">290 ₽</p>
            </button>
        </div>
        <button class="w-full btn-buy text-white font-bold py-3 rounded-lg" id="buy-stars">
            КУПИТЬ STARS
        </button>
    </div>
</div>

<nav class="fixed bottom-0 left-0 right-0 bg-[#0a0e27] border-t border-[#2d3748] p-3 flex justify-around">
    <button class="flex flex-col items-center gap-1 text-blue-500 font-bold text-xs">
        <span class="text-xl">🛍️</span> Магазин
    </button>
    <button class="flex flex-col items-center gap-1 text-gray-400 font-bold text-xs">
        <span class="text-xl">💰</span> Баланс
    </button>
    <button class="flex flex-col items-center gap-1 text-gray-400 font-bold text-xs">
        <span class="text-xl">💬</span> Чат
    </button>
    <button class="flex flex-col items-center gap-1 text-gray-400 font-bold text-xs">
        <span class="text-xl">📦</span> Заказы
    </button>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    let selected = { product: null, price: null };

    document.querySelectorAll('.product-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('.product-btn').forEach(b => b.style.borderColor = '#2d3748');
            this.style.borderColor = '#2563eb';
            selected.product = this.dataset.product;
            selected.price = this.dataset.price;
        });
    });

    document.getElementById('buy-mlbb').addEventListener('click', () => {
        const uid = document.getElementById('mlbb-uid').value;
        const zone = document.getElementById('mlbb-zone').value;

        if (!uid || !zone || !selected.product) {
            alert('❌ Заполни все поля!');
            return;
        }

        tg.sendData(JSON.stringify({
            type: 'order',
            product: selected.product,
            price: selected.price,
            uid,
            zone
        }));
    });

    document.getElementById('buy-stars').addEventListener('click', () => {
        if (!selected.product || !selected.price) {
            alert('❌ Выбери товар!');
            return;
        }

        tg.sendData(JSON.stringify({
            type: 'order',
            product: selected.product,
            price: selected.price
        }));
    });
</script>
</body>
</html>
