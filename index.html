<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>GhostMarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { margin: 0; min-height: 100vh; background: linear-gradient(180deg, #070a1f 0%, #04060f 100%); color: #e2e8f0; }
        .hidden { display: none; }
        .floating-cart { position: fixed; right: 18px; bottom: 86px; z-index: 60; background: linear-gradient(135deg,#7c3aed,#2563eb); color: #fff; padding: 12px 14px; border-radius: 999px; display:flex; gap:8px; align-items:center; box-shadow:0 16px 40px rgba(37,99,235,0.18); cursor:pointer; }
        .floating-cart .badge { background: rgba(0,0,0,0.18); padding:4px 8px; border-radius:999px; font-weight:700; }
        .helper { font-size:12px; color:rgba(226,232,240,0.6); margin-top:6px; }
        .valid { color:#22c55e; }
        .invalid { color:#f87171; }
        .cart-modal { position: fixed; left: 12px; right: 12px; bottom: 120px; z-index: 70; max-width:600px; margin:0 auto; }
    </style>
</head>
<body>
<div class="px-5 pt-6 pb-36">
    <!-- ...existing page content... -->
    <div id="cartSection" class="soft-card rounded-[28px] p-4 mt-5 hidden">
        <!-- скрытый блок, теперь используется только в модальном окне -->
    </div>
</div>

<!-- Плавающая кнопка корзины -->
<div id="floatingCart" class="floating-cart hidden" title="Открыть корзину">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 3h2l.4 2M7 13h10l3-8H6.4" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <div>Корзина</div>
    <div id="floatingCount" class="badge">0</div>
</div>

<!-- Модальное окно корзины -->
<div id="cartModal" class="cart-modal hidden">
    <div class="soft-card rounded-[20px] p-4">
        <div class="flex items-center justify-between mb-3">
            <div>
                <p class="text-sm text-slate-400">Корзина</p>
                <h3 class="text-white text-lg font-semibold">Ваши товары</h3>
            </div>
            <button id="closeCart" class="neon-btn px-3 py-2 rounded-[12px]">Закрыть</button>
        </div>
        <div id="cartListModal" class="space-y-3">
            <div class="rounded-[24px] bg-[#0f172a] p-4 text-slate-400">Корзина пуста</div>
        </div>
        <div class="mt-4 flex items-center justify-between">
            <span class="text-sm text-slate-400">Итог</span>
            <span id="cartTotalModal" class="text-xl font-bold text-white">0 ₽</span>
        </div>
        <div class="mt-4 grid grid-cols-2 gap-3">
            <button id="checkoutButtonModal" class="neon-btn w-full rounded-[24px] py-3 text-base font-semibold">Оплатить</button>
            <button id="clearCart" class="bg-slate-700 rounded-[24px] py-3 text-base font-semibold">Очистить</button>
        </div>
        <p class="helper mt-3">Если товар не придёт в течение часа — напишите @ghostmarket_support</p>
    </div>
</div>

<script>
    const tg = window.Telegram?.WebApp;
    if (tg?.ready) tg.ready();
    const userId = tg?.initDataUnsafe?.user?.id || null;

    const gameIdRules = {
        genshin: { uidExample: 'UID: 9 цифр, например 100123456', uidRegex: /^\d{9}$/, zoneExample: 'Zone: не обязательно' },
        brawl:  { uidExample: 'Player Tag: начинается с #, напр. #AB12C', uidRegex: /^#?[A-Z0-9]{3,}$/i, zoneExample: 'Zone: не обязательно' },
        pubg:   { uidExample: 'Player ID: цифры 7-10, напр. 1234567', uidRegex: /^\d{7,10}$/, zoneExample: 'Zone: не обязательно' },
        freefire:{ uidExample: 'User ID: цифры 6-9, напр. 123456', uidRegex: /^\d{6,9}$/, zoneExample: 'Zone: не обязательно' },
        standoff:{ uidExample: 'ID/никнейм: цифры или буквы, напр. user123', uidRegex: /^[A-Za-z0-9\-_]{3,20}$/, zoneExample: 'Zone: не обязательно' }
    };

    // ...existing code...
    // (внутри вашего существующего JS замените/вставьте следующие расширения)

    // элементы
    const inputUid = document.getElementById('inputUid');
    const inputZone = document.getElementById('inputZone');
    // helper-поля под инпутами
    const uidHelper = document.createElement('div');
    uidHelper.className = 'helper';
    inputUid.insertAdjacentElement('afterend', uidHelper);

    // cart UI
    const floatingCart = document.getElementById('floatingCart');
    const floatingCount = document.getElementById('floatingCount');
    const cartModal = document.getElementById('cartModal');
    const cartListModal = document.getElementById('cartListModal');
    const cartTotalModal = document.getElementById('cartTotalModal');
    const checkoutButtonModal = document.getElementById('checkoutButtonModal');
    const closeCart = document.getElementById('closeCart');
    const clearCart = document.getElementById('clearCart');

    // state добавлен ранее
    // Валидация UID по выбранной игре
    function updateUidHelper() {
        const rules = gameIdRules[state.selectedGame] || {};
        if (!inputUid.value) {
            uidHelper.textContent = rules.uidExample || 'Пример ID';
            uidHelper.className = 'helper';
            return;
        }
        const valid = rules.uidRegex ? rules.uidRegex.test(inputUid.value.trim()) : true;
        uidHelper.textContent = valid ? 'ID выглядит корректно' : 'ID неверного формата';
        uidHelper.className = 'helper ' + (valid ? 'valid' : 'invalid');
    }
    inputUid.addEventListener('input', () => {
        updateUidHelper();
    });

    // показывать cart и синхронизировать иконку
    function updateFloatingCart() {
        if (state.cart.length) {
            floatingCart.classList.remove('hidden');
            floatingCount.textContent = String(state.cart.length);
            floatingCount.classList.remove('hidden');
        } else {
            floatingCart.classList.add('hidden');
        }
    }

    floatingCart.addEventListener('click', () => {
        renderCartModal();
        cartModal.classList.remove('hidden');
    });
    closeCart.addEventListener('click', () => cartModal.classList.add('hidden'));
    clearCart.addEventListener('click', () => {
        state.cart = [];
        renderCart();
        renderCartModal();
        saveState();
    });

    function renderCartModal() {
        if (!state.cart.length) {
            cartListModal.innerHTML = '<div class="rounded-[24px] bg-[#0f172a] p-4 text-slate-400">Корзина пуста</div>';
            cartTotalModal.textContent = '0 ₽';
            floatingCount.textContent = '0';
            updateFloatingCart();
            return;
        }
        cartListModal.innerHTML = state.cart.map((item, i) => `
            <div class="cart-item rounded-[16px] bg-[#0f172a] p-3 flex items-center justify-between gap-4">
                <div>
                    <p class="text-sm text-slate-400">${item.game}</p>
                    <p class="text-white font-semibold mt-1">${item.title}</p>
                    <p class="text-xs text-slate-400 mt-1">UID: ${item.uid}</p>
                </div>
                <div class="text-right">
                    <p class="text-white font-bold">${item.price} ₽</p>
                    <button class="text-xs text-slate-400 mt-2 remove-cart-item" data-index="${i}">Удалить</button>
                </div>
            </div>`).join('');
        const total = state.cart.reduce((sum, item) => sum + item.price, 0);
        cartTotalModal.textContent = `${total} ₽`;
        floatingCount.textContent = String(state.cart.length);
        updateFloatingCart();

        cartListModal.querySelectorAll('.remove-cart-item').forEach(btn => {
            btn.addEventListener('click', () => {
                state.cart.splice(Number(btn.dataset.index),1);
                renderCart();
                renderCartModal();
                saveState();
            });
        });
    }

    // override добавления в корзину: проверка uid и добавление uid/zone/game
    function attachAddToCart() {
        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', () => {
                const index = Number(btn.dataset.index);
                const item = games[state.selectedGame].products[index];

                // проверка UID по правилам
                const rules = gameIdRules[state.selectedGame] || {};
                const uidVal = inputUid.value.trim();
                if (!uidVal || (rules.uidRegex && !rules.uidRegex.test(uidVal))) {
                    showToast('Введите корректный UID для выбранной игры', 'warning');
                    return;
                }

                state.cart.push({
                    game: games[state.selectedGame].name,
                    gameKey: state.selectedGame,
                    title: item.title,
                    price: item.price,
                    uid: uidVal,
                    zone: inputZone.value.trim()
                });
                renderCart();
                renderCartModal();
                showToast('Добавлено в корзину', 'success');
                playClickSound();
                saveState();
                // показываем корзину значок
                updateFloatingCart();
                // синхронизация с ботом (локальные данные)
                syncWithBot('cart_update');
            });
        });
    }

    // изменить renderProducts() чтобы пересобрать слушатели
    function renderProducts() {
        const game = games[state.selectedGame];
        productList.innerHTML = game.products.map((item, index) => `
            <div class="product-card relative rounded-[28px] p-4 bg-[#101828]">
                <div class="absolute left-4 top-4 rounded-full bg-white/5 px-3 py-1 text-xs text-slate-300">Скидка 15%</div>
                <div class="flex items-center gap-4">
                    <div class="badge-icon"><img src="${game.image}" alt="${game.name}"></div>
                    <div>
                        <p class="text-sm text-slate-400">${game.name}</p>
                        <p class="mt-1 text-lg font-semibold text-white">${item.title}</p>
                    </div>
                </div>
                <div class="mt-5 flex items-center justify-between">
                    <span class="text-sm text-slate-400">${game.subtitle}</span>
                    <span class="text-xl font-bold text-white">${item.price} ₽</span>
                </div>
                <button class="neon-btn mt-4 w-full rounded-[22px] py-3 text-sm font-semibold add-to-cart" data-index="${index}">
                    Добавить в корзину
                </button>
            </div>`).join('');

        // после рендера привязываем слушатели
        attachAddToCart();
    }

    // checkout из модального окна: отправка подробностей в бота
    checkoutButtonModal.addEventListener('click', () => {
        const uidVal = inputUid.value.trim();
        const zoneVal = inputZone.value.trim();
        if (!uidVal) { showToast('Укажите UID перед оплатой', 'warning'); return; }
        if (!state.cart.length) { showToast('Корзина пуста', 'warning'); return; }
        // final validation: все элементы должны иметь uid = uidVal
        const total = state.cart.reduce((s,i) => s + i.price, 0);
        const products = state.cart.map(i => i.title).join(', ');
        // отправляем в бота
        if (tg?.sendData) {
            tg.sendData(JSON.stringify({
                type: 'checkout',
                user_id: userId,
                product: products,
                price: total,
                uid: uidVal,
                zone: zoneVal,
                game: state.selectedGame
            }));
        }
        // локальный UX
        state.balance -= total;
        renderBalance();
        state.cart = [];
        renderCart();
        renderCartModal();
        saveState();
        showToast('Заказ отправлен. Ожидайте подтверждения', 'success');
    });

    // инициализация
    function softInit() {
        renderBalance();
        renderGameSelection();
        renderProducts();
        renderCart();
        renderChat();
        renderNotifications();
        selectPage('shop');
        setTimeout(() => syncWithBot('sync_request'), 500);
        updateUidHelper();
        attachAddToCart();
    }

    softInit();
</script>
</body>
</html>
