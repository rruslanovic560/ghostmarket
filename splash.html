<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhostMarket Splash</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", system-ui, sans-serif;
      background: radial-gradient(circle at top, #190634 0%, #050209 45%, #020105 100%);
      overflow: hidden;
      color: #f8f8ff;
    }

    .screen {
      width: 1080px;
      height: 1920px;
      max-width: 100vw;
      max-height: 100vh;
      margin: auto;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(11, 4, 24, 0.95) 0%, rgba(2, 1, 9, 0.99) 100%);
      box-shadow: inset 0 0 140px rgba(124, 58, 237, .22);
    }

    .glow {
      position: absolute;
      width: 170%;
      height: 170%;
      top: -45%;
      left: -40%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.25), transparent 32%);
      filter: blur(80px);
      pointer-events: none;
    }

    .smoke {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 30% 20%, rgba(112, 67, 255, .16), transparent 12%),
        radial-gradient(circle at 80% 18%, rgba(59, 130, 246, .11), transparent 15%),
        radial-gradient(circle at 20% 70%, rgba(168, 85, 247, .06), transparent 18%);
      animation: smokeDrift 20s ease-in-out infinite;
      opacity: .85;
    }

    @keyframes smokeDrift {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(14px, -28px); }
    }

    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .sparkle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 18px rgba(255,255,255,.65);
      opacity: 0;
      animation: sparkle 4s infinite ease-in-out;
    }

    .sparkle:nth-child(1) { left: 12%; top: 18%; animation-delay: 0s; }
    .sparkle:nth-child(2) { left: 74%; top: 12%; animation-delay: 0.8s; }
    .sparkle:nth-child(3) { left: 42%; top: 38%; animation-delay: 1.6s; }
    .sparkle:nth-child(4) { left: 20%; top: 65%; animation-delay: 2.3s; }
    .sparkle:nth-child(5) { left: 82%; top: 72%; animation-delay: 3.1s; }
    .sparkle:nth-child(6) { left: 55%; top: 85%; animation-delay: 1.1s; }

    @keyframes sparkle {
      0%, 100% { transform: scale(0.5); opacity: 0; }
      40% { transform: scale(1.4); opacity: 1; }
      60% { transform: scale(1); opacity: 0.75; }
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 120px 90px 100px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      text-align: center;
    }

    .ghost-wrap {
      position: relative;
      width: 420px;
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: floatGhost 6s ease-in-out infinite;
    }

    @keyframes floatGhost {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-22px); }
    }

    .ghost {
      position: relative;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle at top, rgba(255,255,255,.9), rgba(255,255,255,.08) 52%);
      box-shadow: 0 0 160px rgba(167, 139, 250, .35), inset 0 0 28px rgba(255,255,255,.4);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    .ghost::before,
    .ghost::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,.12);
      filter: blur(14px);
      opacity: .8;
    }

    .ghost::before {
      width: 250px;
      height: 180px;
      top: 14%;
      left: 50%;
      transform: translateX(-50%);
    }

    .ghost::after {
      width: 320px;
      height: 220px;
      top: 40%;
      left: 50%;
      transform: translateX(-50%);
      opacity: .36;
    }

    .ghost-face {
      position: relative;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle at top, rgba(255,255,255,.95), rgba(229, 184, 255,.18) 42%);
      box-shadow: inset 0 0 38px rgba(255,255,255,.35), 0 0 55px rgba(168, 85, 247, .2);
      animation: faceGlow 3.8s ease-in-out infinite;
    }

    @keyframes faceGlow {
      0%, 100% { box-shadow: inset 0 0 38px rgba(255,255,255,.35), 0 0 55px rgba(168, 85, 247, .2); }
      50% { box-shadow: inset 0 0 48px rgba(255,255,255,.62), 0 0 90px rgba(168, 85, 247, .35); }
    }

    .ghost-face::before,
    .ghost-face::after {
      content: "";
      position: absolute;
      top: 34%;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #10061d;
      box-shadow: 0 0 22px rgba(31, 53, 112, .85);
    }

    .ghost-face::before { left: 26%; }
    .ghost-face::after { right: 26%; }

    .ghost-mouth {
      position: absolute;
      left: 50%;
      bottom: 24%;
      width: 70px;
      height: 48px;
      border-radius: 0 0 70px 70px;
      background: rgba(16, 5, 41, 0.95);
      transform: translateX(-50%);
      box-shadow: inset 0 0 14px rgba(255,255,255,.15);
    }

    .ghost-eye-light {
      position: absolute;
      top: 45%;
      left: 22%;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,.55);
      filter: blur(3px);
      animation: blink 4.2s infinite ease-in-out;
    }
    .ghost-eye-light:nth-child(2) { left: auto; right: 22%; }

    @keyframes blink {
      0%, 92%, 100% { transform: scaleY(1); opacity: .65; }
      95% { transform: scaleY(0.2); opacity: .1; }
    }

    .title {
      margin-top: 70px;
      font-size: 96px;
      letter-spacing: .22em;
      line-height: 0.92;
      text-transform: uppercase;
      color: #fff;
      text-shadow:
        0 0 24px rgba(124, 58, 237, .8),
        0 0 68px rgba(124, 58, 237, .14);
      font-family: "Segoe UI", sans-serif;
      animation: titleFlicker 3.5s infinite;
    }

    @keyframes titleFlicker {
      0%, 100% { opacity: 1; text-shadow: 0 0 24px rgba(124, 58, 237, .8), 0 0 68px rgba(124, 58, 237, .14); }
      30% { opacity: .92; }
      50% { opacity: .76; text-shadow: 0 0 34px rgba(174, 85, 255, .95), 0 0 84px rgba(124, 58, 237, .3); }
      80% { opacity: .96; }
    }

    .subtitle {
      margin: 18px 0 0;
      font-size: 32px;
      font-weight: 500;
      color: #d8d8ff;
      letter-spacing: .03em;
      max-width: 780px;
      line-height: 1.5;
      text-shadow: 0 0 14px rgba(166, 147, 255, .22);
    }

    .icon-row {
      display: flex;
      gap: 24px;
      margin: 42px 0 0;
      align-items: center;
      justify-content: center;
    }

    .icon {
      width: 94px;
      height: 94px;
      border-radius: 28px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(124,58,237,.18);
      display: grid;
      place-items: center;
      box-shadow: 0 0 28px rgba(124, 58, 237, .12);
      position: relative;
      overflow: hidden;
      animation: iconPulse 4s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-6px) scale(1.04); }
    }

    .icon::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,.12), transparent 40%);
      opacity: .7;
      pointer-events: none;
    }

    .icon svg {
      width: 42px;
      height: 42px;
      filter: drop-shadow(0 0 18px rgba(124, 58, 237, .5));
      position: relative;
      z-index: 1;
    }

    .loader {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      position: relative;
    }

    .loader-text {
      font-size: 18px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: #c7d2fe;
      margin-bottom: 18px;
      opacity: .9;
    }

    .bar {
      width: 100%;
      height: 28px;
      border-radius: 20px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      overflow: hidden;
      box-shadow: inset 0 0 32px rgba(124,58,237,.14);
      position: relative;
    }

    .bar-inner {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #a855f7, #2563eb);
      border-radius: 20px;
      position: relative;
      animation: fill 6s ease-in-out infinite;
    }

    .bar-inner::before {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      width: 120px;
      height: 100%;
      background: rgba(255,255,255,.25);
      filter: blur(10px);
      transform: translateX(120px);
      animation: glow 1.8s ease-in-out infinite;
    }

    .bar-inner::after {
      content: "";
      position: absolute;
      left: 18%;
      top: 50%;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,.7);
      filter: blur(6px);
      transform: translate(-50%, -50%);
      animation: pulseDot 1.6s infinite ease-in-out;
    }

    @keyframes fill {
      0%, 12% { width: 8%; }
      30% { width: 44%; }
      60% { width: 72%; }
      85% { width: 96%; }
      100% { width: 94%; }
    }

    @keyframes glow {
      0%, 100% { opacity: .12; transform: translateX(120px); }
      50% { opacity: .82; transform: translateX(-18px); }
    }

    @keyframes pulseDot {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: .9; }
      50% { transform: translate(-50%, -50%) scale(1.4); opacity: 0.35; }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="glow"></div>
    <div class="smoke"></div>
    <div class="sparkles">
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
    </div>
    <div class="container">
      <div class="ghost-wrap">
        <div class="ghost">
          <div class="ghost-face">
            <div class="ghost-mouth"></div>
            <span class="ghost-eye-light"></span>
            <span class="ghost-eye-light"></span>
          </div>
        </div>
      </div>
      <div>
        <div class="title">GHOST MARKET</div>
        <div class="subtitle">Игровая валюта и цифровые товары</div>
      </div>
      <div class="icon-row">
        <div class="icon">
          <svg viewBox="0 0 64 64" fill="none"><path d="M23 22c0-4.418 3.582-8 8-8s8 3.582 8 8v14a8 8 0 0 1-16 0V22z" stroke="#e9d5ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 42h32" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/><path d="M23 48h18" stroke="#c4b5fd" stroke-width="4" stroke-linecap="round"/></svg>
        </div>
        <div class="icon">
          <svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="18" stroke="#f8f8ff" stroke-width="4"/><path d="M32 20v24M20 32h24" stroke="#c4b5fd" stroke-width="4" stroke-linecap="round"/></svg>
        </div>
        <div class="icon">
          <svg viewBox="0 0 64 64" fill="none"><path d="M28 20h8l4 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10l4-10z" fill="#c4b5fd" opacity=".85"/><path d="M24 44h16" stroke="#f8f8ff" stroke-width="4" stroke-linecap="round"/></svg>
        </div>
      </div>
      <div class="loader">
        <div class="loader-text">Загрузка... Подготовка портала</div>
        <div class="bar"><div class="bar-inner"></div></div>
      </div>
    </div>
  </div>
</body>
</html>
