<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GhostMarket — Оплата</title>
  <style>
    :root {
      color-scheme: dark;
      color: #e6e3ff;
      background: linear-gradient(180deg, #050613 0%, #090b16 45%, #060714 100%);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, system-ui, sans-serif;
      background-image:
        radial-gradient(circle at top left, rgba(124, 58, 237, .18), transparent 24%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, .14), transparent 22%);
    }
    .box {
      width: min(460px, calc(100% - 32px));
      padding: 26px;
      border-radius: 28px;
      background: rgba(12, 14, 30, 0.96);
      border: 1px solid rgba(124, 58, 237, 0.24);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.30);
      backdrop-filter: blur(12px);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    .hint {
      margin: 0 0 22px;
      color: #9ca3af;
      font-size: 14px;
      line-height: 1.6;
    }
    .row {
      margin-bottom: 18px;
    }
    .label {
      display: block;
      margin-bottom: 8px;
      color: #9ca3af;
      font-size: 12px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .value, .comment, .promo-note, .status {
      width: 100%;
      font-size: 18px;
      line-height: 1.5;
      color: #f8f8ff;
      word-break: break-word;
    }
    .comment {
      min-height: 48px;
    }
    input {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.92);
      padding: 14px 16px;
      color: #eef2ff;
      font-size: 15px;
    }
    input::placeholder { color: #64748b; }
    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(90deg, #7c3aed 0%, #2563eb 100%);
      transition: transform .18s ease, opacity .18s ease;
      box-shadow: 0 18px 35px rgba(124, 58, 237, 0.20);
    }
    button:active { transform: scale(.98); }
    button:disabled {
      opacity: .5;
      cursor: not-allowed;
      box-shadow: none;
    }
    .secondary {
      margin-top: 12px;
      background: rgba(255, 255, 255, 0.06);
      color: #c7d2fe;
      border: 1px solid rgba(148, 163, 184, 0.16);
    }
    .status {
      margin-top: 16px;
      color: #a5b4fc;
      font-size: 13px;
      min-height: 22px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(99, 102, 241, 0.14);
      color: #c7d2fe;
      font-size: 13px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Пополнение GhostMarket</h1>
    <p class="hint">Оплачивая, ты открываешь портал. После подтверждения данные отправятся в бота, и баланс обновится автоматически.</p>

    <div class="row">
      <div class="label">Сумма к оплате</div>
      <div class="value" id="sum">0 ₽</div>
      <div class="tag" id="tagAmount">Мистический пакет</div>
    </div>

    <div class="row">
      <div class="label">Комментарий</div>
      <div class="comment" id="comment">–</div>
    </div>

    <div class="row">
      <label class="label" for="promo">Промокод</label>
      <input id="promo" type="text" placeholder="FIRST15" autocomplete="off" />
      <div class="promo-note" id="promoNote">Введите промокод и нажмите оплатить.</div>
    </div>

    <button id="btnPay">Оплатить сейчас</button>
    <button class="secondary" id="btnCancel">Отмена</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const initialAmount = parseInt(params.get('amount'), 10) || 0;
    const comment = decodeURIComponent(params.get('comment') || '');
    const promoInput = document.getElementById('promo');
    const amountLabel = document.getElementById('sum');
    const commentLabel = document.getElementById('comment');
    const promoNote = document.getElementById('promoNote');
    const status = document.getElementById('status');
    const btnPay = document.getElementById('btnPay');
    const btnCancel = document.getElementById('btnCancel');

    let finalAmount = initialAmount;
    let activePromo = '';

    function formatMoney(value) {
      return `${value.toLocaleString('ru-RU')} ₽`;
    }

    function updateTotal() {
      const code = promoInput.value.trim().toUpperCase();
      const discount = code === 'FIRST15' ? 0.15 : 0;
      activePromo = discount > 0 ? code : '';
      const discountAmount = Math.floor(initialAmount * discount);
      finalAmount = initialAmount - discountAmount;
      amountLabel.textContent = formatMoney(finalAmount);

      if (!initialAmount) {
        promoNote.textContent = 'Сумма не задана. Вернись в магазин.';
      } else if (discount > 0) {
        promoNote.textContent = `Промокод принят: -${formatMoney(discountAmount)}.`;
      } else if (code.length > 0) {
        promoNote.textContent = 'Неверный промокод, но можно продолжить оплату.';
      } else {
        promoNote.textContent = 'FIRST15 дает 15% скидку на первый заказ.';
      }

      btnPay.disabled = finalAmount < 100;
      if (finalAmount < 100 && initialAmount >= 100) {
        btnPay.disabled = true;
        status.textContent = 'После применения промокода сумма должна оставаться ≥ 100 ₽.';
      } else {
        status.textContent = '';
      }
    }

    function sendPaymentResult() {
      const payload = {
        action: 'payment_success',
        amount: finalAmount,
        original_amount: initialAmount,
        comment,
        promo: activePromo,
        timestamp: Date.now()
      };

      status.textContent = '✨ Секунду... отправляем подтверждение в GhostMarket.';
      if (window.Telegram?.WebApp?.sendData) {
        window.Telegram.WebApp.sendData(JSON.stringify(payload));
        window.Telegram.WebApp.close();
      } else {
        status.textContent = '⚠️ WebApp не найден. Перенаправляю на магазин.';
        setTimeout(() => {
          window.location.href = `index.html?payment_success=1&amount=${finalAmount}`;
        }, 1200);
      }
    }

    commentLabel.textContent = comment || 'Комментарий не задан';
    promoInput.value = params.get('promo') || '';
    updateTotal();

    promoInput.addEventListener('input', updateTotal);
    btnPay.addEventListener('click', () => {
      if (finalAmount < 100) {
        status.textContent = 'Минимальная сумма пополнения — 100 ₽.';
        return;
      }
      btnPay.disabled = true;
      sendPaymentResult();
    });

    btnCancel.addEventListener('click', () => {
      if (window.Telegram?.WebApp?.close) {
        window.Telegram.WebApp.close();
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
